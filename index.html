<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: #2a2a35;
  --accent: #c8a96e;
  --accent2: #7c6aff;
  --text: #e8e6e1;
  --muted: #888892;
  --sidebar-w: 260px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── TOPBAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  z-index: 200;
}

#topbar .logo {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--accent);
  font-weight: 700;
  white-space: nowrap;
  margin-right: 8px;
}

#topbar .divider {
  width: 1px; height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

#search-box {
  flex: 1;
  max-width: 320px;
  padding: 7px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
#search-box:focus { border-color: var(--accent); }
#search-box::placeholder { color: var(--muted); }

.topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.btn {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #0e0e10; border-color: var(--accent); font-weight: 500; }
.btn.primary:hover { opacity: 0.85; color: #0e0e10; }

/* ── LAYOUT ── */
#layout {
  display: flex;
  margin-top: 56px;
  min-height: calc(100vh - 56px);
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed;
  top: 56px; left: 0; bottom: 0;
  overflow-y: auto;
  padding: 16px 0 32px;
  z-index: 100;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sidebar-label {
  padding: 12px 18px 6px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  opacity: 0.6;
}

.sidebar-cat {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  user-select: none;
}
.sidebar-cat:hover { color: var(--text); background: var(--surface2); }
.sidebar-cat.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: rgba(200,169,110,0.06);
}
.sidebar-cat .cat-badge {
  margin-left: auto;
  font-size: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 99px;
  color: var(--muted);
}
.sidebar-cat.active .cat-badge {
  border-color: rgba(200,169,110,0.3);
  color: var(--accent);
  background: rgba(200,169,110,0.08);
}

/* ── MAIN ── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 28px 40px 60px;
}

/* ── STATS ── */
#stats {
  display: flex;
  gap: 14px;
  margin-bottom: 24px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 18px;
  flex: 1;
}
.stat .num {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: var(--accent);
  line-height: 1.1;
}
.stat .label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── TABS ── */
#tab-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text); border-color: #3a3a48; background: var(--surface2); }
.tab-btn.active {
  background: var(--accent);
  color: #0e0e10;
  border-color: var(--accent);
  font-weight: 500;
}
.tab-btn .tab-count {
  font-size: 11px;
  background: rgba(0,0,0,0.15);
  padding: 1px 6px;
  border-radius: 99px;
}

/* ── ACCORDION ── */
.acc-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.acc-block:hover { border-color: #333340; }

.acc-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  cursor: pointer;
  user-select: none;
}
.acc-header:hover { background: rgba(255,255,255,0.02); }

.acc-chevron {
  color: var(--muted);
  font-size: 10px;
  transition: transform 0.25s;
  flex-shrink: 0;
}
.acc-block.open .acc-chevron { transform: rotate(90deg); }

.acc-emoji { font-size: 18px; }
.acc-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}
.acc-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 99px;
}
.acc-toggle-btn {
  font-size: 11px;
  color: var(--muted);
  padding: 3px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  margin-left: 4px;
}
.acc-toggle-btn:hover { color: var(--text); background: var(--surface2); }

.acc-body {
  display: none;
  padding: 0 14px 14px;
}
.acc-block.open .acc-body { display: block; }

/* ── PROMPT CARD ── */
.prompt-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
  background: var(--bg);
}
.prompt-card:hover { border-color: #363645; }
.prompt-card:last-child { margin-bottom: 0; }

.card-header {
  padding: 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
}

.card-chevron {
  color: var(--muted);
  font-size: 10px;
  margin-top: 4px;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.prompt-card.open .card-chevron { transform: rotate(90deg); }

.card-title-area { flex: 1; min-width: 0; }
.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; }

.tag {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 99px;
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
}
.tag.model { color: var(--accent2); border-color: rgba(124,106,255,0.25); background: rgba(124,106,255,0.07); }
.tag.date { color: #6eb8a9; border-color: rgba(110,184,169,0.25); background: rgba(110,184,169,0.07); }

.card-body { display: none; padding: 0 16px 14px; }
.prompt-card.open .card-body { display: block; }

.prompt-text {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #c8ccd4;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
}
.copy-btn {
  position: absolute;
  top: 8px; right: 8px;
  padding: 3px 9px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.copy-btn:hover { color: var(--text); border-color: var(--accent); }
.copy-btn.copied { color: #6eb8a9; border-color: #6eb8a9; }

.card-notes {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}
.card-actions { display: flex; gap: 6px; margin-top: 10px; }
.card-actions .btn { font-size: 12px; padding: 4px 10px; }

/* ── EMPTY ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 540px;
  max-width: 92vw;
  max-height: 88vh;
  overflow-y: auto;
  padding: 28px;
}
.modal h3 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  margin-bottom: 20px;
  color: var(--text);
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}
.form-group input:focus,
.form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { min-height: 90px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

@media (max-width: 720px) {
  #sidebar { display: none; }
  #main { margin-left: 0; padding: 20px 16px 48px; }
  .topbar-actions .btn:not(.primary) { display: none; }
  #stats { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<header id="topbar">
  <span class="logo">✦ Prompt Library</span>
  <div class="divider"></div>
  <input id="search-box" type="text" placeholder="🔍  Cari prompt, tag, kategori..." oninput="filterPrompts(this.value)">
  <div class="topbar-actions">
    <button class="btn" onclick="exportData()">⬇ Export</button>
    <button class="btn" onclick="document.getElementById('import-input').click()">⬆ Import</button>
    <input id="import-input" type="file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn primary" onclick="openAddModal()">+ Tambah Prompt</button>
  </div>
</header>

<div id="layout">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-label">Kategori</div>
    <div id="sidebar-cats"></div>
  </nav>

  <!-- MAIN -->
  <main id="main">
    <div id="stats">
      <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Total Prompt</div></div>
      <div class="stat"><div class="num" id="stat-cats">0</div><div class="label">Kategori</div></div>
      <div class="stat"><div class="num" id="stat-month">0</div><div class="label">Bulan Ini</div></div>
    </div>
    <div id="tab-bar"></div>
    <div id="content-area"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Tambah Prompt Baru</h3>
    <div class="form-group">
      <label>Judul Prompt *</label>
      <input id="f-title" type="text" placeholder="Contoh: Email Profesional Generator">
    </div>
    <div class="form-group">
      <label>Kategori *</label>
      <input id="f-category" type="text" placeholder="Contoh: Writing, Coding, Business..." list="cat-list">
      <datalist id="cat-list"></datalist>
    </div>
    <div class="form-group">
      <label>Isi Prompt *</label>
      <textarea id="f-prompt" placeholder="Tulis prompt kamu di sini..."></textarea>
    </div>
    <div class="form-group">
      <label>Model / Platform</label>
      <input id="f-model" type="text" placeholder="Contoh: Claude, GPT-4, Gemini...">
    </div>
    <div class="form-group">
      <label>Tags (pisahkan koma)</label>
      <input id="f-tags" type="text" placeholder="Contoh: kreatif, formal, analisis">
    </div>
    <div class="form-group">
      <label>Catatan</label>
      <textarea id="f-notes" placeholder="Tips atau konteks penggunaan..." style="min-height:60px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Batal</button>
      <button class="btn primary" onclick="savePrompt()">Simpan</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'prompt_library_v1';
let editingId = null;
let activeTab = 'all';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

const SAMPLES = [
  { id:'s1', title:'Summarize Article', category:'Reading & Research', prompt:'Please summarize the following article in 3-5 bullet points, highlighting the most important insights. Then provide a one-sentence takeaway.\n\nArticle:\n[PASTE ARTICLE HERE]', model:'Claude', tags:['ringkasan','riset'], notes:'Bagus untuk artikel panjang atau laporan.', date: new Date().toISOString() },
  { id:'s2', title:'Email Profesional', category:'Writing', prompt:'Tulis email profesional dengan nada [formal/santai] kepada [NAMA/JABATAN] tentang:\n\n[DESKRIPSI TOPIK]\n\nPastikan:\n- Pembukaan sopan\n- Isi jelas dan padat\n- Tindakan yang spesifik\n- Penutup profesional', model:'Claude', tags:['email','bisnis','formal'], notes:'Ganti bagian dalam kurung sesuai kebutuhan.', date: new Date().toISOString() },
  { id:'s3', title:'Debug Code', category:'Coding', prompt:'Tolong debug kode berikut. Identifikasi:\n1. Bug atau error yang ada\n2. Penjelasan mengapa terjadi\n3. Kode yang sudah diperbaiki\n4. Saran optimisasi jika ada\n\nBahasa: [BAHASA PEMROGRAMAN]\n\n```\n[PASTE KODE DI SINI]\n```\n\nError message:\n[ERROR MESSAGE]', model:'Claude', tags:['debug','programming'], notes:'Sertakan error message untuk hasil akurat.', date: new Date().toISOString() },
  { id:'s4', title:'Brainstorm Ide', category:'Creativity', prompt:'Bantu aku brainstorm 10 ide kreatif untuk [TOPIK/PROYEK].\n\nKonteks:\n- Target audience: [SIAPA]\n- Tujuan: [APA]\n- Batasan: [JIKA ADA]\n\nUntuk setiap ide berikan:\n- Nama singkat\n- Deskripsi 1-2 kalimat\n- Potensi tantangan', model:'Claude', tags:['brainstorm','ide','kreatif'], notes:'Tambahkan referensi untuk ide lebih terarah.', date: new Date().toISOString() },
  { id:'s5', title:'Analisis Data', category:'Analysis', prompt:'Analisis data berikut dan berikan:\n1. Tren utama yang terlihat\n2. Anomali atau outlier\n3. Insight yang actionable\n4. Rekomendasi langkah selanjutnya\n\nData:\n[PASTE DATA DI SINI]\n\nKonteks bisnis:\n[JELASKAN KONTEKS]', model:'Claude', tags:['data','analisis','bisnis'], notes:'Sertakan konteks bisnis untuk rekomendasi yang relevan.', date: new Date().toISOString() },
  { id:'s6', title:'Proposal Bisnis', category:'Business', prompt:'Buat proposal bisnis singkat untuk:\n\nProduk/Layanan: [NAMA]\nTarget Market: [SIAPA]\nProblem yang diselesaikan: [APA]\nAnggaran estimasi: [NOMINAL]\n\nStruktur:\n1. Executive Summary\n2. Problem Statement\n3. Proposed Solution\n4. Timeline & Budget\n5. Expected Outcome', model:'Claude', tags:['proposal','bisnis','formal'], notes:'Cocok untuk pitch deck atau dokumen formal.', date: new Date().toISOString() },
];

const CAT_ICONS = {
  'Writing':'✍️','Coding':'💻','Reading & Research':'📖',
  'Creativity':'🎨','Business':'💼','Analysis':'📊',
  'Marketing':'📣','Design':'🖌️','Learning':'🎓','Personal':'🌿'
};
function catIcon(c) { return CAT_ICONS[c] || '📁'; }

function initData() { if (!loadData().length) saveData(SAMPLES); }

function groupByCategory(data) {
  return data.reduce((acc, p) => {
    (acc[p.category] = acc[p.category] || []).push(p);
    return acc;
  }, {});
}

// ── RENDER ───────────────────────────────────────────────
function render(query, tab) {
  query = query !== undefined ? query : document.getElementById('search-box').value;
  tab = tab !== undefined ? tab : activeTab;
  activeTab = tab;

  const data = loadData();
  const cats = groupByCategory(data);
  const q = query.toLowerCase();

  // Stats
  const now = new Date();
  const thisMonth = data.filter(p => {
    const d = new Date(p.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-cats').textContent = Object.keys(cats).length;
  document.getElementById('stat-month').textContent = thisMonth.length;

  // Sidebar
  const sidebarEl = document.getElementById('sidebar-cats');
  const total = data.length;
  let sbHtml = `<div class="sidebar-cat ${tab==='all'?'active':''}" onclick="switchTab('all')">🗂 Semua<span class="cat-badge">${total}</span></div>`;
  Object.entries(cats).forEach(([cat, arr]) => {
    sbHtml += `<div class="sidebar-cat ${tab===cat?'active':''}" onclick="switchTab(${JSON.stringify(cat)})">${catIcon(cat)} ${cat}<span class="cat-badge">${arr.length}</span></div>`;
  });
  sidebarEl.innerHTML = sbHtml;

  // Tabs
  const tabBar = document.getElementById('tab-bar');
  let tabHtml = `<button class="tab-btn ${tab==='all'?'active':''}" onclick="switchTab('all')">🗂 Semua <span class="tab-count">${total}</span></button>`;
  Object.entries(cats).forEach(([cat, arr]) => {
    const cnt = arr.filter(p => matchesQuery(p, q)).length;
    if (q && cnt === 0) return;
    tabHtml += `<button class="tab-btn ${tab===cat?'active':''}" onclick="switchTab(${JSON.stringify(cat)})">${catIcon(cat)} ${cat} <span class="tab-count">${q ? cnt : arr.length}</span></button>`;
  });
  tabBar.innerHTML = tabHtml;

  // Content
  const content = document.getElementById('content-area');
  content.innerHTML = '';

  const entries = tab === 'all'
    ? Object.entries(cats)
    : Object.entries(cats).filter(([c]) => c === tab);

  let anyVisible = false;
  entries.forEach(([cat, arr]) => {
    const filtered = arr.filter(p => matchesQuery(p, q));
    if (!filtered.length) return;
    anyVisible = true;
    content.appendChild(buildAccordion(cat, filtered));
  });

  if (!anyVisible) {
    content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Tidak ada prompt yang cocok.</p></div>`;
  }

  // datalist
  document.getElementById('cat-list').innerHTML = Object.keys(cats).map(c=>`<option value="${c}">`).join('');
}

function buildAccordion(cat, prompts) {
  const slug = slugify(cat);
  const block = document.createElement('div');
  block.className = 'acc-block open';
  block.id = 'acc-' + slug;
  block.innerHTML = `
    <div class="acc-header" onclick="toggleAcc('${slug}')">
      <span class="acc-chevron">▶</span>
      <span class="acc-emoji">${catIcon(cat)}</span>
      <span class="acc-title">${cat}</span>
      <span class="acc-count">${prompts.length} prompt</span>
      <button class="acc-toggle-btn" onclick="toggleAllCards(event,'${slug}')">Tutup Semua</button>
    </div>
    <div class="acc-body" id="acc-body-${slug}"></div>
  `;
  const body = block.querySelector('.acc-body');
  prompts.forEach(p => body.appendChild(buildCard(p)));
  return block;
}

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'prompt-card open'; // open by default
  card.id = 'prompt-' + p.id;

  const tags = (p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const modelTag = p.model ? `<span class="tag model">${p.model}</span>` : '';
  const dateStr = p.date ? new Date(p.date).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}) : '';
  const dateTag = dateStr ? `<span class="tag date">${dateStr}</span>` : '';

  card.innerHTML = `
    <div class="card-header" onclick="toggleCard('${p.id}')">
      <span class="card-chevron">▶</span>
      <div class="card-title-area">
        <div class="card-title">${p.title}</div>
        <div class="card-meta">${modelTag}${tags}${dateTag}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="prompt-text" id="pt-${p.id}">${escHtml(p.prompt)}<button class="copy-btn" onclick="copyPrompt(event,'pt-${p.id}')">Salin</button></div>
      ${p.notes ? `<div class="card-notes">📌 ${escHtml(p.notes)}</div>` : ''}
      <div class="card-actions">
        <button class="btn" onclick="editPrompt('${p.id}')">✏️ Edit</button>
        <button class="btn" style="color:#e07070;border-color:rgba(224,112,112,0.3)" onclick="deletePrompt('${p.id}')">🗑 Hapus</button>
      </div>
    </div>
  `;
  return card;
}

// ── INTERACTIONS ─────────────────────────────────────────
function switchTab(cat) { render(undefined, cat); }

function toggleAcc(slug) {
  document.getElementById('acc-' + slug).classList.toggle('open');
}

function toggleAllCards(e, slug) {
  e.stopPropagation();
  const body = document.getElementById('acc-body-' + slug);
  const cards = body.querySelectorAll('.prompt-card');
  const btn = e.target;
  const anyOpen = [...cards].some(c => c.classList.contains('open'));
  cards.forEach(c => anyOpen ? c.classList.remove('open') : c.classList.add('open'));
  btn.textContent = anyOpen ? 'Buka Semua' : 'Tutup Semua';
}

function toggleCard(id) {
  document.getElementById('prompt-' + id).classList.toggle('open');
}

function copyPrompt(e, id) {
  e.stopPropagation();
  const text = document.getElementById(id).innerText.replace('Salin','').trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = e.target;
    btn.textContent = '✓ Disalin';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Salin'; btn.classList.remove('copied'); }, 2000);
  });
}

function filterPrompts(q) { render(q); }

function matchesQuery(p, q) {
  if (!q) return true;
  return (p.title+p.category+p.prompt+(p.tags||[]).join(' ')+(p.notes||'')).toLowerCase().includes(q);
}

// ── MODAL ─────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Tambah Prompt Baru';
  ['f-title','f-category','f-prompt','f-model','f-tags','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal').classList.add('open');
}

function editPrompt(id) {
  const p = loadData().find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Prompt';
  document.getElementById('f-title').value = p.title;
  document.getElementById('f-category').value = p.category;
  document.getElementById('f-prompt').value = p.prompt;
  document.getElementById('f-model').value = p.model || '';
  document.getElementById('f-tags').value = (p.tags||[]).join(', ');
  document.getElementById('f-notes').value = p.notes || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function savePrompt() {
  const title = document.getElementById('f-title').value.trim();
  const category = document.getElementById('f-category').value.trim();
  const prompt = document.getElementById('f-prompt').value.trim();
  if (!title || !category || !prompt) { alert('Judul, Kategori, dan Prompt wajib diisi!'); return; }
  const data = loadData();
  const tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const entry = { title, category, prompt, model: document.getElementById('f-model').value.trim(), tags, notes: document.getElementById('f-notes').value.trim() };
  if (editingId) {
    const idx = data.findIndex(x => x.id === editingId);
    if (idx !== -1) data[idx] = { ...data[idx], ...entry };
  } else {
    data.push({ id: 'p'+Date.now(), ...entry, date: new Date().toISOString() });
  }
  saveData(data);
  closeModal();
  render(undefined, category);
}

function deletePrompt(id) {
  if (!confirm('Hapus prompt ini?')) return;
  saveData(loadData().filter(x => x.id !== id));
  render();
}

function exportData() {
  const blob = new Blob([JSON.stringify(loadData(), null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'prompt-library-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!Array.isArray(imp)) throw new Error();
      const existing = loadData();
      imp.forEach(p => { if (!existing.find(x=>x.id===p.id)) existing.push(p); });
      saveData(existing);
      render(); alert(`✓ Berhasil import ${imp.length} prompt!`);
    } catch { alert('File tidak valid.'); }
  };
  reader.readAsText(file); e.target.value = '';
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function slugify(s) { return s.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

initData();
render();
</script>
</body>
</html>
