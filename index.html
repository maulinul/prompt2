<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #16161a;
  --surface2: #1e1e24;
  --border: #2a2a35;
  --accent: #c8a96e;
  --accent2: #7c6aff;
  --green: #6eb8a9;
  --text: #e8e6e1;
  --muted: #888892;
  --red: #e07070;
  --sidebar-w: 260px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── TOPBAR ── */
#topbar {
  position: fixed; top:0; left:0; right:0; height:56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 14px; z-index: 200;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--accent); font-weight: 700;
  white-space: nowrap;
}
.topbar-div { width:1px; height:20px; background:var(--border); flex-shrink:0; }
#search-box {
  flex:1; max-width:300px;
  padding: 7px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none;
  transition: border-color 0.2s;
}
#search-box:focus { border-color: var(--accent); }
#search-box::placeholder { color: var(--muted); }
.topbar-right { margin-left:auto; display:flex; gap:8px; }

/* ── BUTTONS ── */
.btn {
  padding: 7px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent); color: #0e0e10; border-color: var(--accent); font-weight:500; }
.btn.primary:hover { opacity: 0.85; color: #0e0e10; }
.btn.danger { color: var(--red); border-color: rgba(224,112,112,0.3); }
.btn.danger:hover { border-color: var(--red); background: rgba(224,112,112,0.08); color: var(--red); }
.btn.sm { font-size:12px; padding:4px 10px; }

/* ── LAYOUT ── */
#layout { display:flex; margin-top:56px; min-height:calc(100vh - 56px); }

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border);
  position: fixed; top:56px; left:0; bottom:0;
  overflow-y: auto; padding: 16px 0 32px; z-index:100;
}
#sidebar::-webkit-scrollbar { width:3px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius:4px; }
.sb-label {
  padding: 12px 18px 6px; font-size:10px;
  text-transform: uppercase; letter-spacing:0.1em;
  color: var(--muted); opacity:0.6;
}
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 18px; font-size:13px; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
  border-left: 2px solid transparent; user-select: none;
}
.sb-item:hover { color: var(--text); background: var(--surface2); }
.sb-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(200,169,110,0.06); }
.sb-badge {
  margin-left: auto; font-size:10px;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 1px 6px; border-radius: 99px; color: var(--muted);
}
.sb-item.active .sb-badge { border-color: rgba(200,169,110,0.3); color: var(--accent); background: rgba(200,169,110,0.08); }

/* ── MAIN ── */
#main { margin-left: var(--sidebar-w); flex:1; padding: 28px 40px 60px; }

/* ── STATS ── */
#stats { display:flex; gap:14px; margin-bottom:24px; }
.stat { background: var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; flex:1; }
.stat .num { font-family:'Playfair Display',serif; font-size:24px; color:var(--accent); line-height:1.1; }
.stat .lbl { font-size:11px; color:var(--muted); margin-top:2px; }

/* ── TABS ── */
#tab-bar { display:flex; gap:6px; margin-bottom:22px; flex-wrap:wrap; }
.tab {
  display: flex; align-items: center; gap:6px;
  padding: 8px 16px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; transition: all 0.15s; white-space:nowrap;
}
.tab:hover { color: var(--text); border-color: #3a3a48; background: var(--surface2); }
.tab.active { background: var(--accent); color: #0e0e10; border-color: var(--accent); font-weight:500; }
.tab .tc { font-size:11px; background:rgba(0,0,0,0.15); padding:1px 6px; border-radius:99px; }

/* ── MASTER BLOCK ── */
.master-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; margin-bottom: 14px; overflow: hidden;
}
.master-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; cursor: pointer; user-select: none;
  transition: background 0.15s;
}
.master-header:hover { background: rgba(255,255,255,0.025); }
.master-chevron {
  color: var(--accent); font-size:11px;
  transition: transform 0.25s; flex-shrink:0;
}
.master-block.open .master-chevron { transform: rotate(90deg); }
.master-icon { font-size:20px; }
.master-title {
  font-family: 'Playfair Display', serif;
  font-size: 19px; font-weight:700; color: var(--text); flex:1;
}
.master-desc { font-size:12px; color:var(--muted); margin-top:2px; }
.master-count {
  font-size:11px; color:var(--muted);
  background: var(--surface2); border:1px solid var(--border);
  padding: 2px 8px; border-radius:99px;
}
.master-actions { display:flex; gap:6px; margin-left:8px; }
.master-body { display:none; padding: 0 16px 16px; }
.master-block.open .master-body { display:block; }

/* ── SUB PROMPT CARD ── */
.sub-card {
  border: 1px solid var(--border); border-radius:10px;
  margin-bottom: 8px; overflow:hidden;
  background: var(--bg); transition: border-color 0.15s;
}
.sub-card:last-child { margin-bottom:0; }
.sub-card:hover { border-color: #363645; }
.sub-header {
  display: flex; align-items: flex-start; gap:12px;
  padding: 12px 16px; cursor: pointer;
}
.sub-chevron {
  color: var(--muted); font-size:10px; margin-top:4px;
  transition: transform 0.2s; flex-shrink:0;
}
.sub-card.open .sub-chevron { transform: rotate(90deg); }
.sub-title-area { flex:1; min-width:0; }
.sub-title { font-size:14px; font-weight:500; color:var(--text); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sub-meta { display:flex; gap:6px; flex-wrap:wrap; }
.tag { font-size:11px; padding:2px 7px; border-radius:99px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); font-family:'DM Mono',monospace; }
.tag.model { color:var(--accent2); border-color:rgba(124,106,255,0.25); background:rgba(124,106,255,0.07); }
.tag.date { color:var(--green); border-color:rgba(110,184,169,0.25); background:rgba(110,184,169,0.07); }
.sub-body { display:none; padding:0 16px 14px; }
.sub-card.open .sub-body { display:block; }
.prompt-text {
  background: var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:12px 14px;
  font-family:'DM Mono',monospace; font-size:12px; color:#c8ccd4;
  line-height:1.75; white-space:pre-wrap; word-break:break-word; position:relative;
}
.copy-btn {
  position:absolute; top:8px; right:8px;
  padding:3px 9px; background:var(--surface); border:1px solid var(--border);
  border-radius:6px; color:var(--muted); font-size:11px; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all 0.15s;
}
.copy-btn:hover { color:var(--text); border-color:var(--accent); }
.copy-btn.copied { color:var(--green); border-color:var(--green); }
.sub-notes { margin-top:8px; font-size:12px; color:var(--muted); font-style:italic; }
.sub-actions { display:flex; gap:6px; margin-top:10px; }

/* ── ADD SUB PROMPT inline ── */
.add-sub-btn {
  width:100%; margin-top:10px;
  padding: 9px; border-radius:8px;
  border: 1px dashed var(--border); background: transparent;
  color: var(--muted); font-family:'DM Sans',sans-serif; font-size:13px;
  cursor:pointer; transition:all 0.2s; text-align:center;
}
.add-sub-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(200,169,110,0.04); }

/* ── EMPTY ── */
.empty-state { text-align:center; padding:48px 24px; color:var(--muted); }
.empty-state .icon { font-size:36px; margin-bottom:10px; }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.72); z-index:999;
  align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; width:520px; max-width:92vw;
  max-height:88vh; overflow-y:auto; padding:28px;
}
.modal h3 { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:20px; color:var(--text); }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:5px; }
.form-group input, .form-group textarea, .form-group select {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:13px; padding:9px 12px; outline:none; transition:border-color 0.2s; resize:vertical;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--accent); }
.form-group textarea { min-height:90px; }
.form-group select option { background:var(--surface2); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }

@media(max-width:720px){
  #sidebar{display:none;}
  #main{margin-left:0;padding:20px 16px 48px;}
  #stats{flex-wrap:wrap;}
}
</style>
</head>
<body>

<header id="topbar">
  <span class="logo">✦ Prompt Library</span>
  <div class="topbar-div"></div>
  <input id="search-box" type="text" placeholder="🔍  Cari prompt..." oninput="doSearch(this.value)">
  <div class="topbar-right">
    <button class="btn" onclick="exportData()">⬇ Export</button>
    <button class="btn" onclick="document.getElementById('imp').click()">⬆ Import</button>
    <input id="imp" type="file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn primary" onclick="openMasterModal()">+ Master Prompt</button>
  </div>
</header>

<div id="layout">
  <nav id="sidebar"><div class="sb-label">Master Prompts</div><div id="sb-list"></div></nav>
  <main id="main">
    <div id="stats">
      <div class="stat"><div class="num" id="s-masters">0</div><div class="lbl">Master Prompt</div></div>
      <div class="stat"><div class="num" id="s-subs">0</div><div class="lbl">Total Sub Prompt</div></div>
      <div class="stat"><div class="num" id="s-month">0</div><div class="lbl">Ditambah Bulan Ini</div></div>
    </div>
    <div id="tab-bar"></div>
    <div id="content"></div>
  </main>
</div>

<!-- MASTER MODAL -->
<div class="modal-overlay" id="master-modal">
  <div class="modal">
    <h3 id="master-modal-title">Tambah Master Prompt</h3>
    <div class="form-group"><label>Nama Master *</label><input id="m-name" type="text" placeholder="Contoh: Writing, Coding, Business..."></div>
    <div class="form-group"><label>Icon (emoji)</label><input id="m-icon" type="text" placeholder="📁" maxlength="4"></div>
    <div class="form-group"><label>Deskripsi</label><input id="m-desc" type="text" placeholder="Singkat tentang kategori ini..."></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeMasterModal()">Batal</button>
      <button class="btn primary" onclick="saveMaster()">Simpan</button>
    </div>
  </div>
</div>

<!-- SUB PROMPT MODAL -->
<div class="modal-overlay" id="sub-modal">
  <div class="modal">
    <h3 id="sub-modal-title">Tambah Sub Prompt</h3>
    <div class="form-group"><label>Master Prompt *</label>
      <select id="s-master"></select>
    </div>
    <div class="form-group"><label>Judul Sub Prompt *</label><input id="s-title" type="text" placeholder="Contoh: Email Formal ke Klien"></div>
    <div class="form-group"><label>Isi Prompt *</label><textarea id="s-prompt" placeholder="Tulis prompt kamu di sini..."></textarea></div>
    <div class="form-group"><label>Model / Platform</label><input id="s-model" type="text" placeholder="Claude, GPT-4, Gemini..."></div>
    <div class="form-group"><label>Tags (pisahkan koma)</label><input id="s-tags" type="text" placeholder="kreatif, formal, analisis"></div>
    <div class="form-group"><label>Catatan</label><textarea id="s-notes" placeholder="Tips atau konteks..." style="min-height:60px"></textarea></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSubModal()">Batal</button>
      <button class="btn primary" onclick="saveSub()">Simpan</button>
    </div>
  </div>
</div>

<script>
const KEY = 'pl_v2';
let activeTab = 'all';
let editMasterId = null;
let editSubId = null;
let subTargetMasterId = null;

// ── DATA ─────────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || defaultData(); }
  catch { return defaultData(); }
}
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function defaultData() {
  return {
    masters: [
      { id:'m1', name:'Writing', icon:'✍️', desc:'Prompt untuk menulis konten, email, artikel' },
      { id:'m2', name:'Coding', icon:'💻', desc:'Prompt untuk programming dan debugging' },
      { id:'m3', name:'Business', icon:'💼', desc:'Prompt untuk analisis dan keperluan bisnis' },
    ],
    subs: [
      { id:'sub1', masterId:'m1', title:'Email Profesional', prompt:'Tulis email profesional dengan nada [formal/santai] kepada [NAMA] tentang:\n\n[TOPIK]\n\nPastikan:\n- Pembukaan sopan\n- Isi jelas dan padat\n- Permintaan spesifik\n- Penutup profesional', model:'Claude', tags:['email','formal'], notes:'Ganti bagian dalam kurung.', date:new Date().toISOString() },
      { id:'sub2', masterId:'m1', title:'Artikel Blog', prompt:'Tulis artikel blog dengan struktur:\n- Headline yang menarik\n- Hook di paragraf pertama\n- 3-5 poin utama dengan contoh\n- Call to action\n\nTopik: [TOPIK]\nTone: [formal/casual]\nPanjang: [jumlah kata]', model:'Claude', tags:['blog','konten'], notes:'Cocok untuk blog dan Medium.', date:new Date().toISOString() },
      { id:'sub3', masterId:'m2', title:'Debug Code', prompt:'Debug kode berikut:\n1. Identifikasi bug\n2. Penjelasan penyebab\n3. Kode yang diperbaiki\n4. Saran optimisasi\n\nBahasa: [BAHASA]\n\n```\n[KODE]\n```\n\nError: [ERROR MESSAGE]', model:'Claude', tags:['debug'], notes:'Sertakan error message.', date:new Date().toISOString() },
      { id:'sub4', masterId:'m2', title:'Code Review', prompt:'Lakukan code review pada kode berikut. Berikan feedback tentang:\n- Readability & naming\n- Performance issues\n- Security concerns\n- Best practices\n- Refactoring suggestions\n\n```\n[KODE]\n```', model:'Claude', tags:['review','kualitas'], notes:'', date:new Date().toISOString() },
      { id:'sub5', masterId:'m3', title:'Analisis Kompetitor', prompt:'Analisis kompetitor untuk bisnis saya:\n\nBisnis saya: [DESKRIPSI]\nKompetitor: [NAMA KOMPETITOR]\n\nAnalisis:\n1. Strengths & Weaknesses mereka\n2. Strategi yang mereka pakai\n3. Gap yang bisa saya manfaatkan\n4. Rekomendasi diferensiasi', model:'Claude', tags:['analisis','strategi'], notes:'', date:new Date().toISOString() },
      { id:'sub6', masterId:'m3', title:'Proposal Bisnis', prompt:'Buat proposal bisnis untuk:\n\nProduk/Layanan: [NAMA]\nTarget Market: [SIAPA]\nProblem: [APA]\nBudget: [NOMINAL]\n\nStruktur:\n1. Executive Summary\n2. Problem Statement\n3. Solution\n4. Timeline & Budget\n5. Expected Outcome', model:'Claude', tags:['proposal','formal'], notes:'Cocok untuk pitch deck.', date:new Date().toISOString() },
    ]
  };
}

// ── RENDER ───────────────────────────────────────────────
function render(q) {
  q = q !== undefined ? q : (document.getElementById('search-box').value || '');
  const ql = q.toLowerCase();
  const { masters, subs } = load();

  // stats
  const now = new Date();
  const thisMonth = subs.filter(s => { const d = new Date(s.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  document.getElementById('s-masters').textContent = masters.length;
  document.getElementById('s-subs').textContent = subs.length;
  document.getElementById('s-month').textContent = thisMonth.length;

  // sidebar
  let sbHtml = `<div class="sb-item ${activeTab==='all'?'active':''}" onclick="setTab('all')">🗂 Semua<span class="sb-badge">${subs.length}</span></div>`;
  masters.forEach(m => {
    const cnt = subs.filter(s=>s.masterId===m.id).length;
    sbHtml += `<div class="sb-item ${activeTab===m.id?'active':''}" onclick="setTab('${m.id}')">${m.icon} ${m.name}<span class="sb-badge">${cnt}</span></div>`;
  });
  document.getElementById('sb-list').innerHTML = sbHtml;

  // tabs
  let tabHtml = `<button class="tab ${activeTab==='all'?'active':''}" onclick="setTab('all')">🗂 Semua <span class="tc">${subs.length}</span></button>`;
  masters.forEach(m => {
    const cnt = subs.filter(s => s.masterId===m.id && matchSub(s,ql)).length;
    if (ql && cnt===0) return;
    tabHtml += `<button class="tab ${activeTab===m.id?'active':''}" onclick="setTab('${m.id}')">${m.icon} ${m.name} <span class="tc">${ql?cnt:subs.filter(s=>s.masterId===m.id).length}</span></button>`;
  });
  document.getElementById('tab-bar').innerHTML = tabHtml;

  // content
  const content = document.getElementById('content');
  content.innerHTML = '';

  const visibleMasters = activeTab === 'all' ? masters : masters.filter(m => m.id === activeTab);
  let any = false;

  visibleMasters.forEach(m => {
    const mSubs = subs.filter(s => s.masterId===m.id && matchSub(s,ql));
    if (ql && mSubs.length===0) return;
    any = true;
    content.appendChild(buildMasterBlock(m, ql ? mSubs : subs.filter(s=>s.masterId===m.id)));
  });

  if (!any) content.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Tidak ada prompt yang cocok.</p></div>`;

  // update sub master select
  updateMasterSelect(masters);
}

function buildMasterBlock(m, mSubs) {
  const block = document.createElement('div');
  block.className = 'master-block open';
  block.id = 'mb-' + m.id;
  block.innerHTML = `
    <div class="master-header" onclick="toggleMaster('${m.id}')">
      <span class="master-chevron">▶</span>
      <span class="master-icon">${m.icon}</span>
      <div style="flex:1">
        <div class="master-title">${m.name}</div>
        ${m.desc ? `<div class="master-desc">${m.desc}</div>` : ''}
      </div>
      <span class="master-count">${mSubs.length} prompt</span>
      <div class="master-actions" onclick="event.stopPropagation()">
        <button class="btn sm" onclick="openEditMaster('${m.id}')">✏️</button>
        <button class="btn sm danger" onclick="deleteMaster('${m.id}')">🗑</button>
      </div>
    </div>
    <div class="master-body" id="mb-body-${m.id}"></div>
  `;
  const body = block.querySelector('.master-body');
  if (mSubs.length === 0) {
    body.innerHTML = `<div style="padding:12px 4px;color:var(--muted);font-size:13px;font-style:italic">Belum ada sub prompt. Tambah yuk!</div>`;
  } else {
    mSubs.forEach(s => body.appendChild(buildSubCard(s)));
  }
  // add sub btn
  const addBtn = document.createElement('button');
  addBtn.className = 'add-sub-btn';
  addBtn.textContent = '+ Tambah Sub Prompt';
  addBtn.onclick = () => openSubModal(m.id);
  body.appendChild(addBtn);
  return block;
}

function buildSubCard(s) {
  const card = document.createElement('div');
  card.className = 'sub-card';
  card.id = 'sc-' + s.id;
  const tags = (s.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const modelTag = s.model ? `<span class="tag model">${s.model}</span>` : '';
  const dateStr = s.date ? new Date(s.date).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}) : '';
  const dateTag = dateStr ? `<span class="tag date">${dateStr}</span>` : '';
  card.innerHTML = `
    <div class="sub-header" onclick="toggleSub('${s.id}')">
      <span class="sub-chevron">▶</span>
      <div class="sub-title-area">
        <div class="sub-title">${s.title}</div>
        <div class="sub-meta">${modelTag}${tags}${dateTag}</div>
      </div>
    </div>
    <div class="sub-body">
      <div class="prompt-text" id="pt-${s.id}">${escH(s.prompt)}<button class="copy-btn" onclick="doCopy(event,'pt-${s.id}')">Salin</button></div>
      ${s.notes ? `<div class="sub-notes">📌 ${escH(s.notes)}</div>` : ''}
      <div class="sub-actions">
        <button class="btn sm" onclick="openEditSub('${s.id}')">✏️ Edit</button>
        <button class="btn sm danger" onclick="deleteSub('${s.id}')">🗑 Hapus</button>
      </div>
    </div>
  `;
  return card;
}

// ── TOGGLE ────────────────────────────────────────────────
function toggleMaster(id) { document.getElementById('mb-'+id).classList.toggle('open'); }
function toggleSub(id) { document.getElementById('sc-'+id).classList.toggle('open'); }
function setTab(id) { activeTab = id; render(); }
function doSearch(q) { render(q); }

// ── COPY ─────────────────────────────────────────────────
function doCopy(e, id) {
  e.stopPropagation();
  const text = document.getElementById(id).innerText.replace('Salin','').trim();
  navigator.clipboard.writeText(text).then(() => {
    const b = e.target; b.textContent='✓ Disalin'; b.classList.add('copied');
    setTimeout(()=>{ b.textContent='Salin'; b.classList.remove('copied'); },2000);
  });
}

// ── MASTER MODAL ──────────────────────────────────────────
function openMasterModal() {
  editMasterId = null;
  document.getElementById('master-modal-title').textContent = 'Tambah Master Prompt';
  document.getElementById('m-name').value = '';
  document.getElementById('m-icon').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('master-modal').classList.add('open');
}
function openEditMaster(id) {
  const { masters } = load();
  const m = masters.find(x=>x.id===id); if (!m) return;
  editMasterId = id;
  document.getElementById('master-modal-title').textContent = 'Edit Master Prompt';
  document.getElementById('m-name').value = m.name;
  document.getElementById('m-icon').value = m.icon;
  document.getElementById('m-desc').value = m.desc || '';
  document.getElementById('master-modal').classList.add('open');
}
function closeMasterModal() { document.getElementById('master-modal').classList.remove('open'); editMasterId=null; }
function saveMaster() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('Nama master wajib diisi!'); return; }
  const d = load();
  const entry = { name, icon: document.getElementById('m-icon').value.trim() || '📁', desc: document.getElementById('m-desc').value.trim() };
  if (editMasterId) {
    const idx = d.masters.findIndex(x=>x.id===editMasterId);
    if (idx!==-1) d.masters[idx] = { ...d.masters[idx], ...entry };
  } else {
    d.masters.push({ id:'m'+Date.now(), ...entry });
  }
  save(d); closeMasterModal(); render();
}
function deleteMaster(id) {
  if (!confirm('Hapus master prompt ini beserta semua sub prompt di dalamnya?')) return;
  const d = load();
  d.masters = d.masters.filter(x=>x.id!==id);
  d.subs = d.subs.filter(x=>x.masterId!==id);
  save(d);
  if (activeTab===id) activeTab='all';
  render();
}

// ── SUB MODAL ─────────────────────────────────────────────
function updateMasterSelect(masters) {
  const sel = document.getElementById('s-master');
  sel.innerHTML = masters.map(m=>`<option value="${m.id}">${m.icon} ${m.name}</option>`).join('');
}
function openSubModal(masterId) {
  editSubId = null; subTargetMasterId = masterId || null;
  document.getElementById('sub-modal-title').textContent = 'Tambah Sub Prompt';
  ['s-title','s-prompt','s-model','s-tags','s-notes'].forEach(id=>document.getElementById(id).value='');
  if (masterId) document.getElementById('s-master').value = masterId;
  document.getElementById('sub-modal').classList.add('open');
}
function openEditSub(id) {
  const { subs } = load();
  const s = subs.find(x=>x.id===id); if (!s) return;
  editSubId = id;
  document.getElementById('sub-modal-title').textContent = 'Edit Sub Prompt';
  document.getElementById('s-master').value = s.masterId;
  document.getElementById('s-title').value = s.title;
  document.getElementById('s-prompt').value = s.prompt;
  document.getElementById('s-model').value = s.model||'';
  document.getElementById('s-tags').value = (s.tags||[]).join(', ');
  document.getElementById('s-notes').value = s.notes||'';
  document.getElementById('sub-modal').classList.add('open');
}
function closeSubModal() { document.getElementById('sub-modal').classList.remove('open'); editSubId=null; subTargetMasterId=null; }
function saveSub() {
  const masterId = document.getElementById('s-master').value;
  const title = document.getElementById('s-title').value.trim();
  const prompt = document.getElementById('s-prompt').value.trim();
  if (!title||!prompt) { alert('Judul dan Prompt wajib diisi!'); return; }
  const d = load();
  const tags = document.getElementById('s-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const entry = { masterId, title, prompt, model:document.getElementById('s-model').value.trim(), tags, notes:document.getElementById('s-notes').value.trim() };
  if (editSubId) {
    const idx = d.subs.findIndex(x=>x.id===editSubId);
    if (idx!==-1) d.subs[idx] = { ...d.subs[idx], ...entry };
  } else {
    d.subs.push({ id:'s'+Date.now(), ...entry, date:new Date().toISOString() });
  }
  save(d); closeSubModal(); render();
}
function deleteSub(id) {
  if (!confirm('Hapus sub prompt ini?')) return;
  const d = load(); d.subs = d.subs.filter(x=>x.id!==id); save(d); render();
}

// ── EXPORT / IMPORT ──────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='prompt-library-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(e) {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (!imp.masters||!imp.subs) throw new Error();
      const d = load();
      imp.masters.forEach(m=>{ if(!d.masters.find(x=>x.id===m.id)) d.masters.push(m); });
      imp.subs.forEach(s=>{ if(!d.subs.find(x=>x.id===s.id)) d.subs.push(s); });
      save(d); render(); alert(`✓ Import berhasil!`);
    } catch { alert('File tidak valid.'); }
  };
  r.readAsText(file); e.target.value='';
}

// ── HELPERS ──────────────────────────────────────────────
function matchSub(s, q) {
  if (!q) return true;
  return (s.title+s.prompt+(s.tags||[]).join(' ')+(s.notes||'')).toLowerCase().includes(q);
}
function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// close modal on overlay click
['master-modal','sub-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
});

// ── INIT ─────────────────────────────────────────────────
if (!localStorage.getItem(KEY)) save(defaultData());
render();
</script>
